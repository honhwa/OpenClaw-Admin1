version: '3.8'

services:
  # OpenClaw-Admin 应用服务
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: openclaw-admin
    ports:
      - "10001:10001"
    environment:
      - NODE_ENV=production
      - PORT=10001
      - OPENCLAW_WS_URL=${OPENCLAW_WS_URL:-ws://openclaw:18789}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data
      - ./backups:/app/backups
      - ./config:/app/config
    depends_on:
      - openclaw
    networks:
      - app-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:10001/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # OpenClaw 网关服务（可选，如果本地运行）
  openclaw:
    image: openclaw/gateway:latest
    container_name: openclaw-gateway
    ports:
      - "18789:18789"
    environment:
      - NODE_ENV=production
    volumes:
      - openclaw-data:/root/.openclaw
    networks:
      - app-network
    restart: unless-stopped
    profiles:
      - with-gateway

  # Redis 缓存（可选）
  redis:
    image: redis:7-alpine
    container_name: openclaw-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - app-network
    restart: unless-stopped
    profiles:
      - with-cache

volumes:
  openclaw-data:
  redis-data:

networks:
  app-network:
    driver: bridge
